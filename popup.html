<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Chat Translator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Twitch Chat Translator</h1>
    </header>

    <label class="row">
      <span data-i18n="uiLang">Interface language</span>
      <select id="uiLang">
        <option value="auto" data-i18n="uiLangAuto">Auto (browser)</option>
      </select>
    </label>

    <label class="row switch-row">
      <span data-i18n="enableTranslation">Enable translation</span>
      <input type="checkbox" id="enabled" />
    </label>

    <label class="row switch-row">
      <span data-i18n="autoTranslateOutgoing">Auto-translate my messages on Enter</span>
      <input type="checkbox" id="translateOutgoing" />
    </label>

    <label class="row">
      <span data-i18n="myMessagesLang">My message language</span>
      <select id="outgoingTarget">
        <option value="auto" data-i18n="autoChatLang">Auto (chat language)</option>
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="uk">Українська</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="pt">Português</option>
        <option value="pl">Polski</option>
        <option value="tr">Türkçe</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="zh">中文</option>
      </select>
    </label>

    <p class="detected" id="detected">Chat language: not detected</p>

    <p class="hint" id="hint" data-i18n-html="hintHtml">
      <b>Ctrl + Enter</b> in the chat box — translate the message right in the
      field (without sending), then review and press Enter.
    </p>

    <label class="row">
      <span data-i18n="translationLang">Translation language</span>
      <select id="target">
        <option value="ru">Русский</option>
        <option value="en">English</option>
        <option value="uk">Українська</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="pt">Português</option>
        <option value="pl">Polski</option>
        <option value="tr">Türkçe</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="zh">中文</option>
      </select>
    </label>

    <label class="row">
      <span data-i18n="service">Service</span>
      <select id="provider">
        <option value="google_free" data-i18n="providerGoogleFree">Google (no key)</option>
        <option value="google_api" data-i18n="providerGoogleApi">Google Cloud (key)</option>
        <option value="deepl" data-i18n="providerDeepl">DeepL (key)</option>
      </select>
    </label>

    <label class="row column" id="keyRow" hidden>
      <span data-i18n="apiKey">API key</span>
      <input type="password" id="apiKey" placeholder="Paste the key" data-i18n-placeholder="apiKeyPlaceholder" />
    </label>

    <p class="status" id="status"></p>
  </body>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</html>
